name: Scan Website

on:

  push:
    branches:
      - main

  schedule:
    # 8:00 AM NZST (UTC+12) Mon–Fri = 20:00 UTC Sun–Thu
    # During NZDT (UTC+13, Sep–Apr) this fires at 9:00 AM NZ time
    - cron: '0 20 * * 0-4'

  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:

  # ── E2E / monitoring tests — run on push + schedule ─────────────────────────
  e2e:
    name: E2E Tests (Chrome only)
    timeout-minutes: 5
    runs-on: ubuntu-latest
    env:
      # Non-sensitive defaults — hardcoded here, no secrets needed
      SMTP_HOST:   smtp.gmail.com
      SMTP_PORT:   '587'
      SMTP_SECURE: 'false'
      # Sensitive credentials — stored as Repository Secrets
      SMTP_USER:   ${{ secrets.SMTP_USER }}
      SMTP_PASS:   ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chrome)
        run: npx playwright test tests/test-cases/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-debug
          path: test-results/
          retention-days: 7
