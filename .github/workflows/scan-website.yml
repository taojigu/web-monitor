name: Scan Website

on:

  schedule:
    # Run monitoring every weekday at 9 AM UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:

  # ── E2E / monitoring tests — run on push + schedule ─────────────────────────
  e2e:
    name: E2E Tests (Chrome only)
    timeout-minutes: 120
    runs-on: ubuntu-latest
    env:
      # Non-sensitive defaults — hardcoded here, no secrets needed
      SMTP_HOST:   smtp.gmail.com
      SMTP_PORT:   '587'
      SMTP_SECURE: 'false'
      # Sensitive credentials — stored as Repository Secrets
      SMTP_USER:   ${{ secrets.SMTP_USER }}
      SMTP_PASS:   ${{ secrets.SMTP_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium only
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (Chrome)
        run: npx playwright test tests/test-cases/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 30
